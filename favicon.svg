<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#080D18"/>
  <!-- Bar chart bars -->
  <rect x="8"  y="38" width="10" height="18" rx="2.5" fill="#0070F3"/>
  <rect x="22" y="26" width="10" height="30" rx="2.5" fill="#0070F3"/>
  <rect x="36" y="16" width="10" height="40" rx="2.5" fill="#00C896"/>
  <rect x="50" y="8"  width="10" height="48" rx="2.5" fill="#00C896"/>
  <!-- Trend line -->
  <polyline points="13,36 27,24 41,14 55,6"
